<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'DM Sans',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4587f4"/><stop offset="0.55" stop-color="#7a6cf0"/><stop offset="1" stop-color="#9a6cf2"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="4%" r="118%">
      <stop offset="0" stop-color="#f9f1e3"/><stop offset="1" stop-color="#e9dec8"/>
    </radialGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#3a2c1e" flood-opacity="0.17"/>
    </filter>
  </defs>

  <rect width="900" height="560" fill="url(#bg)"/>
  <g fill="none" stroke="#cdbfa6" stroke-opacity="0.30">
    <circle cx="450" cy="120" r="250"/><circle cx="450" cy="120" r="360"/><circle cx="450" cy="120" r="470"/>
  </g>

  <text x="450" y="120" text-anchor="middle" font-size="22" letter-spacing="6" font-weight="700" fill="#93577f">MY AI TOOLKIT</text>

  <!-- tiles -->
  <g filter="url(#sh)">
    <rect x="76"  y="186" width="160" height="160" rx="38" fill="#f7eee1"/>
    <rect x="272" y="186" width="160" height="160" rx="38" fill="#ffffff"/>
    <rect x="468" y="186" width="160" height="160" rx="38" fill="#1d1b19"/>
    <rect x="664" y="186" width="160" height="160" rx="38" fill="#ffffff"/>
  </g>

  <!-- Claude sunburst -->
  <g transform="translate(156,266)" fill="#cf5b41">
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(30)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(60)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(90)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(120)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(150)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(180)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(210)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(240)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(270)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(300)"/>
    <rect x="-3.6" y="-46" width="7.2" height="25" rx="3.6" transform="rotate(330)"/>
  </g>

  <!-- Gemini sparkle -->
  <path transform="translate(352,266)" d="M0,-52 C9,-19 19,-9 52,0 C19,9 9,19 0,52 C-9,19 -19,9 -52,0 C-19,-9 -9,-19 0,-52 Z" fill="url(#gem)"/>

  <!-- Manus monogram -->
  <text x="548" y="300" text-anchor="middle" font-size="94" font-weight="700" fill="#ffffff">M</text>

  <!-- Nano Banana -->
  <g transform="translate(744,266)" fill="none" stroke-linecap="round">
    <path d="M-30,-20 Q-42,20 -2,31 Q36,35 40,-2" stroke="#2f2417" stroke-width="27"/>
    <path d="M-30,-20 Q-42,20 -2,31 Q36,35 40,-2" stroke="#f6c945" stroke-width="18"/>
  </g>

  <!-- labels -->
  <g text-anchor="middle" font-size="23" font-weight="600" fill="#2c2420">
    <text x="156" y="402">Claude</text>
    <text x="352" y="402">Gemini</text>
    <text x="548" y="402">Manus</text>
    <text x="744" y="402">Nano Banana</text>
  </g>

  <text x="450" y="470" text-anchor="middle" font-size="22" fill="#6f6358">The tools behind every free thing on this page.</text>
</svg>
