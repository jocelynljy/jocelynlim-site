<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — The Why (Vox-style motion)</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--terra:#f2724f;--amber:#ffb24d;--cream:#f7eddb;--soft:#cdbda6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f3ecde;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;color:#2a2018}
.ribbon{background:linear-gradient(135deg,#c8674f,#a8462f);color:#fff;text-align:center;font-size:12px;padding:7px 16px}
.frame{max-width:1180px;margin:0 auto;padding:0 28px}
.kicktop{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#6f6253;font-weight:600;padding:30px 0 12px}
.stage{position:relative;height:75vh;min-height:480px;overflow:hidden;border-radius:22px;background:#120d09;box-shadow:0 30px 70px rgba(40,25,15,.25)}
canvas{position:absolute;inset:0;width:100%;height:100%}
.vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 120% at 50% 45%,transparent 52%,rgba(0,0,0,.5))}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 7%}
#scene{width:min(940px,94%);color:var(--cream);text-shadow:0 2px 34px rgba(0,0,0,.55)}
.big{font-family:'Fraunces',serif;font-weight:340;font-size:clamp(30px,5.3vw,62px);line-height:1.05;letter-spacing:-.02em}
.med{font-family:'Fraunces',serif;font-weight:340;font-size:clamp(23px,3.8vw,44px);line-height:1.15}
.lead{display:block;font-family:'Fraunces',serif;font-style:italic;font-size:clamp(19px,2.8vw,32px);color:var(--soft);margin-bottom:.1em;opacity:0;animation:aFade .55s both}
.huge{display:inline-block;font-family:'Fraunces',serif;font-weight:400;font-style:italic;font-size:clamp(42px,8.6vw,102px);letter-spacing:-.025em;line-height:.96;
  background:linear-gradient(100deg,#ffd27a,#ff8a4c 55%,#f2643c);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 6px 34px rgba(242,114,79,.55));opacity:0;animation:aScale .9s cubic-bezier(.2,1.25,.3,1) both;animation-delay:.3s}
em{font-style:italic;color:var(--terra)}
.u{position:relative;white-space:nowrap}
.u::after{content:"";position:absolute;left:-2px;right:-2px;bottom:-.06em;height:.085em;border-radius:3px;background:linear-gradient(90deg,#ffb24d,#f2643c);transform:scaleX(0);transform-origin:left;animation:uw .55s .3s cubic-bezier(.3,1,.3,1) forwards}
@keyframes uw{to{transform:scaleX(1)}}
.stampwrap{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(28px,5vw,56px);display:flex;gap:.55em;justify-content:center;flex-wrap:wrap}
.stamp{display:inline-block;opacity:0}
.w{display:inline-block;opacity:0}
.fade{animation:aFade .6s both}
.fromL{animation:aFromL .7s cubic-bezier(.2,.9,.2,1) both}
.fromR{animation:aFromR .7s cubic-bezier(.2,.9,.2,1) both}
.pop{animation:aPop .55s cubic-bezier(.2,1.35,.35,1) both}
.jit{animation:aJit .7s both}
.out{animation:aOut .4s both!important}
@keyframes aFade{from{opacity:0;transform:translateY(20px);filter:blur(8px)}to{opacity:1;transform:none;filter:none}}
@keyframes aFromL{from{opacity:0;transform:translateX(-90px)}to{opacity:1;transform:none}}
@keyframes aFromR{from{opacity:0;transform:translateX(90px)}to{opacity:1;transform:none}}
@keyframes aPop{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
@keyframes aScale{0%{opacity:0;transform:scale(.45);filter:blur(10px)}100%{opacity:1;transform:scale(1)}}
@keyframes aJit{0%{opacity:0;transform:translateY(-26px)}55%{opacity:1;transform:none}63%{transform:translateX(-7px)}71%{transform:translateX(7px)}80%{transform:translateX(-3px)}100%{transform:none}}
@keyframes aWord{from{opacity:0;transform:translateY(22px) rotate(-6deg)}to{opacity:1;transform:none}}
@keyframes aStamp{0%{opacity:0;transform:scale(1.9);letter-spacing:.16em}100%{opacity:1;transform:scale(1)}}
@keyframes aOut{to{opacity:0;transform:translateY(-16px) scale(.99);filter:blur(5px)}}
.glitch{animation:gl .5s steps(2) 2}
@keyframes gl{0%{transform:translate(0,0)}25%{transform:translate(-3px,1px)}50%{transform:translate(3px,-1px)}75%{transform:translate(-2px,0)}100%{transform:none}}
.bar{height:3px;background:#e2d8c6;border-radius:3px;margin-top:14px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffb24d,#c8553d)}
.controls{display:flex;gap:12px;align-items:center;margin:16px 0 50px}
.btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;border:none;background:linear-gradient(135deg,#c8674f,#a8462f);color:#fff;border-radius:40px;padding:10px 20px;cursor:pointer}
.note{font-size:13px;color:#6f6253}
</style>
</head>
<body>
<div class="ribbon">Preview · Vox-style "why" — continuous motion: traveling pulses, ripples, streaks, a payoff bloom. Cool→warm. Voiceover later.</div>
<div class="frame">
  <div class="kicktop">the why · vox-style motion concept</div>
  <div class="stage" id="stage">
    <canvas id="cv"></canvas>
    <div class="vig"></div>
    <div class="overlay"><div id="scene"></div></div>
  </div>
  <div class="bar"><i id="prog"></i></div>
  <div class="controls"><button class="btn" id="replay">▶ Replay</button><span class="note">~28s · cuts will sync to your voiceover later.</span></div>
</div>
<script>
const stage=document.getElementById('stage'),cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const sceneEl=document.getElementById('scene'),prog=document.getElementById('prog');
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
const N=58,P=[];let pulses=[],ripples=[],streaks=[];let bloomAt=-1,glitchUntil=0,streamUntil=0;
function mkGlow(c){const s=64,o=document.createElement('canvas');o.width=o.height=s;const g=o.getContext('2d');const rg=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);rg.addColorStop(0,c);rg.addColorStop(.3,c);rg.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=rg;g.beginPath();g.arc(s/2,s/2,s/2,0,7);g.fill();return o;}
const GCOOL=mkGlow('rgba(120,175,230,0.95)'),GWARM=mkGlow('rgba(255,180,90,1)'),GHOT=mkGlow('rgba(255,235,180,1)');
function layout(){const cx=W/2,cy=H/2,R=Math.min(W,H)*0.255;
  for(let i=0;i<N;i++){const a=(i/N)*Math.PI*2;const ring=(i%3===0)?R*0.5:(i%3===1?R*0.85:R*1.12);
    P[i]=P[i]||{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.7,vy:(Math.random()-.5)*.7,z:0.25+Math.random()*0.75,seed:Math.random()*99};
    P[i].ang=a;P[i].rr=ring;}}
function resize(){W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);layout();}
addEventListener('resize',resize);
let runStart=Infinity,gatherAt=4700,total=28000,lastPulse=0;
function smooth(t){t=Math.max(0,Math.min(1,t));return t*t*(3-2*t);}
function aurora(t,warm){const blobs=[
  {x:0.2+0.07*Math.sin(t*0.00022),y:0.3+0.06*Math.cos(t*0.00018),r:0.7,c1:[80,120,180],c2:[245,150,70]},
  {x:0.82+0.06*Math.cos(t*0.0002),y:0.22+0.07*Math.sin(t*0.00024),r:0.62,c1:[60,160,160],c2:[255,190,90]},
  {x:0.5+0.08*Math.sin(t*0.00016),y:0.86+0.06*Math.cos(t*0.00026),r:0.85,c1:[70,90,160],c2:[225,80,70]}];
  for(const b of blobs){const cx=b.x*W,cy=b.y*H,rad=b.r*Math.max(W,H),col=b.c1.map((v,i)=>Math.round(v+(b.c2[i]-v)*warm));
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);g.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${0.15+0.16*warm})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}}
function grid(t,warm){const cx=W/2,cy=H*0.52,vp=H*0.5,cool=[110,150,195],wc=[245,160,90],col=cool.map((v,i)=>Math.round(v+(wc[i]-v)*warm));
  ctx.lineWidth=1;ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${0.05+0.06*warm})`;const sc=(t*0.00005)%1;
  for(let i=0;i<16;i++){const f=((i+sc)/16),y=cy+Math.pow(f,2.2)*vp,y2=cy-Math.pow(f,2.2)*vp;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(W,y2);ctx.stroke();}
  for(let i=-9;i<=9;i++){ctx.beginPath();ctx.moveTo(cx+i*22,cy);ctx.lineTo(cx+i*W*0.16,cy+vp);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+i*22,cy);ctx.lineTo(cx+i*W*0.16,cy-vp);ctx.stroke();}}
function frame(now){const el=now-runStart,idle=el<0;let g=smooth((el-gatherAt)/1900);
  ctx.clearRect(0,0,W,H);const base=ctx.createLinearGradient(0,0,0,H);base.addColorStop(0,'#171009');base.addColorStop(1,'#241a12');ctx.fillStyle=base;ctx.fillRect(0,0,W,H);
  aurora(now,g);grid(now,g);
  const cx=W/2,cy=H/2,swayX=Math.sin(now*0.0002)*10,swayY=Math.cos(now*0.00017)*8;
  // cold scan beam
  if(g<0.3){const sx=((now*0.18)%(W+200))-100;const lg=ctx.createLinearGradient(sx-60,0,sx+60,0);lg.addColorStop(0,'rgba(120,175,230,0)');lg.addColorStop(.5,'rgba(140,190,240,0.10)');lg.addColorStop(1,'rgba(120,175,230,0)');ctx.fillStyle=lg;ctx.fillRect(sx-60,0,120,H);}
  // bloom impulse
  let bloomBoost=0;
  if(bloomAt>0){const bt=(now-bloomAt)/1100;if(bt<1){bloomBoost=(1-bt);const rr=bt*Math.max(W,H)*0.6;const rg=ctx.createRadialGradient(cx,cy,rr*0.6,cx,cy,rr);rg.addColorStop(0,'rgba(255,200,110,0)');rg.addColorStop(.8,`rgba(255,190,100,${0.18*(1-bt)})`);rg.addColorStop(1,'rgba(255,190,100,0)');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);}}
  // update particles
  for(const p of P){
    if(g<0.04){p.x+=p.vx*(0.6+p.z);p.y+=p.vy*(0.6+p.z);if(p.x<6||p.x>W-6)p.vx*=-1;if(p.y<6||p.y>H-6)p.vy*=-1;}
    else{const orb=p.ang+now*0.00016;const rr=p.rr*(1+bloomBoost*0.5);const tx=cx+Math.cos(orb)*rr+swayX,ty=cy+Math.sin(orb)*rr+swayY;p.x+=(tx-p.x)*0.055*g;p.y+=(ty-p.y)*0.055*g;}
    p.dx=p.x+Math.sin(now*0.0006+p.seed)*7*p.z;p.dy=p.y+Math.cos(now*0.0005+p.seed)*7*p.z;
  }
  // network lines + spawn pulses
  let edges=[];
  if(g>0.28){const D=Math.min(W,H)*0.19;ctx.lineWidth=1;
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){const a=P[i],b=P[j],dx=a.dx-b.dx,dy=a.dy-b.dy,d=Math.hypot(dx,dy);
      if(d<D){const al=(1-d/D)*0.55*g;ctx.strokeStyle=`rgba(255,165,90,${al})`;ctx.beginPath();ctx.moveTo(a.dx,a.dy);ctx.lineTo(b.dx,b.dy);ctx.stroke();edges.push([a,b]);}}
    if(now-lastPulse>200 && edges.length){lastPulse=now;const e=edges[(Math.random()*edges.length)|0];pulses.push({a:e[0],b:e[1],t:0});if(pulses.length>22)pulses.shift();}
  }
  // traveling pulses
  ctx.globalAlpha=1;for(const pu of pulses){pu.t+=0.022;if(pu.t>1)continue;const x=pu.a.dx+(pu.b.dx-pu.a.dx)*pu.t,y=pu.a.dy+(pu.b.dy-pu.a.dy)*pu.t;ctx.drawImage(GHOT,x-7,y-7,14,14);}
  pulses=pulses.filter(p=>p.t<=1);
  // ripples
  for(const r of ripples){r.t+=0.012;const rad=r.t*Math.min(W,H)*0.5;ctx.strokeStyle=`rgba(255,180,95,${(1-r.t)*0.5})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(r.x,r.y,rad,0,7);ctx.stroke();}
  ripples=ripples.filter(r=>r.t<1);
  // streaks (race to scale virtual)
  if(now<streamUntil){if(Math.random()<0.4)streaks.push({y:Math.random()*H,x:-100,sp:8+Math.random()*10,len:120+Math.random()*180});}
  for(const s of streaks){s.x+=s.sp;const lg=ctx.createLinearGradient(s.x-s.len,0,s.x,0);lg.addColorStop(0,'rgba(255,200,120,0)');lg.addColorStop(1,'rgba(255,210,140,0.5)');ctx.strokeStyle=lg;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(s.x-s.len,s.y);ctx.lineTo(s.x,s.y);ctx.stroke();}
  streaks=streaks.filter(s=>s.x<W+200);
  // nodes
  for(const p of P){const s=(11+p.z*22)*(g>0.5?1.1:1)*(1+bloomBoost*0.5),al=idle?0.5:(0.5+0.5*p.z);
    if(1-g>0.02){ctx.globalAlpha=(1-g)*al;ctx.drawImage(GCOOL,p.dx-s/2,p.dy-s/2,s,s);}
    if(g>0.02){ctx.globalAlpha=Math.min(1,g*al+bloomBoost*0.4);ctx.drawImage(GWARM,p.dx-s/2,p.dy-s/2,s,s);}}
  ctx.globalAlpha=1;requestAnimationFrame(frame);}
requestAnimationFrame(frame);
function ripple(x,y){ripples.push({x:x||W/2,y:y||H/2,t:0});}
const SC=[
 {t:0,    html:"They say AI is coming for our jobs.", cls:"big jit"},
 {t:2800, html:"Maybe. But some things it simply <em class='u'>can't</em> replace.", cls:"big fade"},
 {t:5400, html:"The energy of a room when strangers <em class='u'>actually connect.</em>", cls:"big fromR"},
 {t:8400, html:"The whole room — <em class='u'>laughing together.</em>", cls:"big pop"},
 {t:10900,html:"A stranger who becomes a <em class='u'>friend.</em>", cls:"med fromL"},
 {t:13300,html:"AI can't build those moments at all.", cls:"big fade"},
 {t:16400,html:"So while the world races to scale the virtual —", cls:"med fromL"},
 {t:19000,html:"I'm building the <em class='u'>opposite</em>:", cls:"med pop"},
 {t:21000,html:"<span class='lead'>experiences, ventures &amp; spaces that are</span><span class='huge'>aggressively human.</span>", cls:""},
 {t:25000,html:"Meet people. Go deeper. <em class='u'>Stay connected.</em>", cls:"big stagger"},
];
let timers=[];
function showScene(s){sceneEl.innerHTML=`<div class="${s.cls}">${s.html}</div>`;
  if(s.cls.includes('stagger')){const box=sceneEl.firstElementChild,txt=box.innerHTML;box.innerHTML=txt.replace(/(<em[^>]*>.*?<\/em>|[^<\s]+)(\s*)/g,(m,w,sp)=>`<span class="w">${w}</span>${sp}`);box.querySelectorAll('.w').forEach((el,i)=>{el.style.animation='aWord .5s both';el.style.animationDelay=(i*0.1)+'s';});}}
function cue(fn,t){timers.push(setTimeout(fn,t));}
function run(){timers.forEach(clearTimeout);timers=[];pulses=[];ripples=[];streaks=[];bloomAt=-1;runStart=performance.now();
  prog.style.transition='none';prog.style.width='0';void prog.offsetWidth;prog.style.transition='width '+(total/1000)+'s linear';prog.style.width='100%';
  SC.forEach((s,i)=>{cue(()=>showScene(s),s.t);const end=(i+1<SC.length?SC[i+1].t:total)-400;cue(()=>{const c=sceneEl.firstElementChild;if(c)c.classList.add('out');},Math.max(s.t,end));});
  // visual cues
  cue(()=>ripple(),5400);cue(()=>ripple(),8400);cue(()=>ripple(),10900);
  cue(()=>{sceneEl.classList.add('glitch');setTimeout(()=>sceneEl.classList.remove('glitch'),700);},13300);
  cue(()=>{streamUntil=performance.now()+2400;},16400);
  cue(()=>ripple(),18900);
  cue(()=>{bloomAt=performance.now();ripple();},21000);
  cue(()=>ripple(),25000);
}
document.getElementById('replay').onclick=run;
resize();
new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)run();})},{threshold:.4}).observe(stage);
</script>
</body>
</html>
