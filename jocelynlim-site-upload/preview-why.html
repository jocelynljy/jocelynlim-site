<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — The Why (motion graphics)</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#2a2018;--soft:#6f6253;--terra:#c8553d;--disp:'Fraunces',serif;--body:'DM Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f3ecde;color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
.ribbon{background:linear-gradient(135deg,#c8674f,#a8462f);color:#fff;text-align:center;font-size:12px;padding:7px 16px}
.frame{max-width:1180px;margin:0 auto;padding:0 28px}
.kicktop{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--soft);font-weight:600;padding:30px 0 12px}
.stage{position:relative;height:74vh;min-height:470px;overflow:hidden;border-radius:22px;border:1px solid #e2d8c6;
  background:radial-gradient(65% 65% at 82% 12%,rgba(200,85,61,.10),transparent 70%),radial-gradient(60% 60% at 8% 92%,rgba(74,94,148,.08),transparent 70%),#f6efe1}
canvas{position:absolute;inset:0;width:100%;height:100%}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 6%}
#scene{width:min(880px,94%)}
.big{font-family:var(--disp);font-weight:340;font-size:clamp(30px,5.2vw,60px);line-height:1.03;letter-spacing:-.02em}
.med{font-family:var(--disp);font-weight:340;font-size:clamp(24px,3.8vw,44px);line-height:1.12}
.huge{font-family:var(--disp);font-weight:400;font-style:italic;color:var(--terra);font-size:clamp(42px,8.5vw,100px);letter-spacing:-.025em;line-height:.98;display:inline-block}
em{font-style:italic;color:var(--terra)}
.stampwrap{font-family:var(--disp);font-size:clamp(28px,5vw,56px);font-style:italic;display:flex;gap:.5em;justify-content:center;flex-wrap:wrap}
.stamp{display:inline-block;opacity:0}
.w{display:inline-block;opacity:0}
/* entrances */
.fade{animation:aFade .6s both}
.fromL{animation:aFromL .7s cubic-bezier(.2,.9,.2,1) both}
.fromR{animation:aFromR .7s cubic-bezier(.2,.9,.2,1) both}
.pop{animation:aPop .6s cubic-bezier(.2,1.3,.35,1) both}
.jit{animation:aJit .7s both}
.scaleup{animation:aScale .8s cubic-bezier(.2,1.2,.3,1) both}
.out{animation:aOut .42s both!important}
@keyframes aFade{from{opacity:0;transform:translateY(18px) scale(.98);filter:blur(7px)}to{opacity:1;transform:none;filter:none}}
@keyframes aFromL{from{opacity:0;transform:translateX(-70px)}to{opacity:1;transform:none}}
@keyframes aFromR{from{opacity:0;transform:translateX(70px)}to{opacity:1;transform:none}}
@keyframes aPop{0%{opacity:0;transform:scale(.55)}100%{opacity:1;transform:scale(1)}}
@keyframes aScale{0%{opacity:0;transform:scale(.4);filter:blur(8px)}100%{opacity:1;transform:scale(1);filter:none}}
@keyframes aJit{0%{opacity:0;transform:translateY(-26px)}55%{opacity:1;transform:none}62%{transform:translateX(-5px)}69%{transform:translateX(5px)}76%{transform:translateX(-3px)}83%{transform:translateX(3px)}100%{transform:none}}
@keyframes aWord{from{opacity:0;transform:translateY(18px) rotate(-4deg)}to{opacity:1;transform:none}}
@keyframes aStamp{0%{opacity:0;transform:scale(1.7);letter-spacing:.12em}100%{opacity:1;transform:scale(1)}}
@keyframes aOut{to{opacity:0;transform:translateY(-16px) scale(.99);filter:blur(4px)}}
.bar{height:3px;background:#e2d8c6;border-radius:3px;margin-top:14px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:var(--terra)}
.controls{display:flex;gap:12px;align-items:center;margin:16px 0 50px}
.btn{font-family:var(--body);font-weight:600;font-size:14px;border:none;background:linear-gradient(135deg,#c8674f,#a8462f);color:#fff;border-radius:40px;padding:10px 20px;cursor:pointer}
.note{font-size:13px;color:var(--soft)}
@media(prefers-reduced-motion:reduce){.note::after{content:" (reduced-motion on — animation simplified)"}}
</style>
</head>
<body>
<div class="ribbon">Preview · "The why" as motion graphics — scattered noise converges into human connection. Autoplays silently; voiceover added later.</div>
<div class="frame">
  <div class="kicktop">the why · motion concept</div>
  <div class="stage" id="stage">
    <canvas id="cv"></canvas>
    <div class="overlay"><div id="scene"></div></div>
  </div>
  <div class="bar"><i id="prog"></i></div>
  <div class="controls"><button class="btn" id="replay">▶ Replay</button><span class="note">~26s · the cuts will sync to your voiceover later.</span></div>
</div>

<script>
const stage=document.getElementById('stage'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const sceneEl=document.getElementById('scene'), prog=document.getElementById('prog');
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
function resize(){W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);layout();}
addEventListener('resize',resize);

const N=46, P=[];
function layout(){
  const cx=W/2, cy=H/2, R=Math.min(W,H)*0.30;
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2;
    const ring = i%3===0 ? R*0.55 : R; // two loose rings -> web look
    P[i]=P[i]||{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5};
    P[i].tx=cx+Math.cos(a)*ring+(Math.random()-.5)*26;
    P[i].ty=cy+Math.sin(a)*ring+(Math.random()-.5)*26;
  }
}
function lerpC(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}
const GREY=[170,160,142], TERRA=[200,85,61];
let runStart=Infinity, gatherAt=9300, total=26500;
function frame(now){
  const el=now-runStart;
  let g = Math.max(0,Math.min(1,(el-gatherAt)/1700)); g=g*g*(3-2*g); // smoothstep
  const idle = el<0;
  ctx.clearRect(0,0,W,H);
  const col=lerpC(GREY,TERRA,g);
  // update + draw nodes
  for(const p of P){
    if(g<0.04){ p.x+=p.vx; p.y+=p.vy; if(p.x<8||p.x>W-8)p.vx*=-1; if(p.y<8||p.y>H-8)p.vy*=-1; }
    else { p.x+=(p.tx-p.x)*0.06*g + (Math.random()-.5)*0.3; p.y+=(p.ty-p.y)*0.06*g + (Math.random()-.5)*0.3; }
  }
  // lines when gathering
  if(g>0.35){
    const D=Math.min(W,H)*0.20;
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
      const dx=P[i].x-P[j].x, dy=P[i].y-P[j].y, d=Math.hypot(dx,dy);
      if(d<D){ ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${(1-d/D)*0.45*g})`; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(P[i].x,P[i].y); ctx.lineTo(P[j].x,P[j].y); ctx.stroke(); }
    }
  }
  for(const p of P){ ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${idle?0.5:0.85})`; ctx.beginPath(); ctx.arc(p.x,p.y, g>0.5?3.4:2.6, 0, 7); ctx.fill(); }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

const SC=[
 {t:0,    html:"AI is coming for the work.", cls:"big jit"},
 {t:2700, html:"But here's what it <em>can't</em> take.", cls:"big fade"},
 {t:5100, html:"<span class='stampwrap'><span class='stamp'>a mic.</span><span class='stamp'>a workshop.</span><span class='stamp'>a pitch.</span></span>", cls:""},
 {t:7500, html:"“Just pick one thing.”", cls:"med fromL"},
 {t:9600, html:"The energy when strangers <em>actually connect.</em>", cls:"big fromR"},
 {t:12600,html:"A room — <em>laughing together.</em>", cls:"big pop"},
 {t:15000,html:"AI can't build that.", cls:"big fade"},
 {t:17500,html:"So I'm building the opposite —", cls:"med fromL"},
 {t:19800,html:"<span class='huge'>aggressively human.</span>", cls:"scaleup"},
 {t:23000,html:"Meet people. Go deeper. <em>Stay connected.</em>", cls:"big stagger"},
];
let timers=[];
function clearTimers(){timers.forEach(clearTimeout);timers=[];}
function showScene(s){
  sceneEl.innerHTML=`<div class="${s.cls}">${s.html}</div>`;
  const stamps=sceneEl.querySelectorAll('.stamp');
  stamps.forEach((el,i)=>{el.style.animation='aStamp .45s both';el.style.animationDelay=(i*0.22)+'s';});
  if(s.cls.includes('stagger')){
    const box=sceneEl.firstElementChild; const txt=box.innerHTML;
    box.innerHTML=txt.replace(/(<em>.*?<\/em>|[^<\s]+)(\s*)/g,(m,word,sp)=>`<span class="w">${word}</span>${sp}`);
    box.querySelectorAll('.w').forEach((el,i)=>{el.style.animation='aWord .5s both';el.style.animationDelay=(i*0.09)+'s';});
  }
}
function run(){
  clearTimers(); runStart=performance.now();
  prog.style.transition='none'; prog.style.width='0'; void prog.offsetWidth;
  prog.style.transition='width '+(total/1000)+'s linear'; prog.style.width='100%';
  SC.forEach((s,idx)=>{
    timers.push(setTimeout(()=>showScene(s), s.t));
    const end = (idx+1<SC.length ? SC[idx+1].t : total) - 420;
    timers.push(setTimeout(()=>{const c=sceneEl.firstElementChild; if(c)c.classList.add('out');}, Math.max(s.t,end)));
  });
}
document.getElementById('replay').onclick=run;
resize();
new IntersectionObserver((e)=>{e.forEach(x=>{if(x.isIntersecting){run();}})},{threshold:.4}).observe(stage);
</script>
</body>
</html>
